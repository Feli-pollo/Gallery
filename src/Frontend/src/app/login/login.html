<div class="flex items-center justify-center content-center min-h-screen">
    <div class="w-100 h-100 bg-gray-400 flex items-center justify-center rounded-md">

        <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)" class="flex flex-col gap-4">
            <label for="username" class="text-white font-bold">Nombre de Usuario</label>
            <input name="user" #user="ngModel" [(ngModel)]="login.user" required type="text"
                placeholder="Escribe tu usuario"
                class="rounded-md bg-white/80 px-3 py-2 text-sm font-semibold text-black inset-ring inset-ring-black/5">
            <label for="password" class="text-white font-bold">Contraseña</label>
            <input name="password" #password="ngModel" [(ngModel)]="login.password" required type="password"
                class="rounded-md bg-white/80 px-3 py-2 text-sm font-semibold text-black inset-ring inset-ring-black/5">
            <button type="submit" [disabled]="loginForm.invalid"
                class="rounded-md bg-black/30 px-3 py-2 text-sm font-semibold text-white inset-ring inset-ring-white/5 hover:bg-white/20">Apachurrale</button>
        </form>
    </div>
</div>
